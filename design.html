<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Aaron Aw - Digital Business Card</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'glass-dark': 'rgba(15, 23, 42, 0.6)',
            'brand-purple': '#6366f1',
            'brand-blue': '#3b82f6',
          },
          backgroundImage: {
            'main-gradient': 'radial-gradient(circle at top right, #1e1b4b, #020617)',
            'button-gradient': 'linear-gradient(90deg, #4f46e5 0%, #3b82f6 100%)',
          }
        }
      }
    }
  </script>
<!-- Custom Styles for Effects -->
<style data-purpose="custom-glassmorphism">
    .glass-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .profile-glow {
      box-shadow: 0 0 25px 2px rgba(59, 130, 246, 0.6);
    }

    .main-card-border {
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="bg-main-gradient min-h-screen flex items-center justify-center p-4 font-sans text-white">
<!-- BEGIN: Main Card Container -->
<main class="relative w-full max-w-md bg-opacity-20 bg-slate-900 rounded-[3rem] p-8 main-card-border overflow-hidden flex flex-col items-center" data-purpose="digital-business-card" id="main-card">
<!-- BEGIN: Profile Section -->
<section class="flex flex-col items-center text-center mb-8" data-purpose="profile-header">
<!-- Profile Image with Neon Glow -->
<div class="relative w-40 h-40 mb-6">
<div class="absolute inset-0 rounded-full profile-glow border-2 border-blue-400"></div>
<img alt="Aaron Aw Profile" class="w-full h-full rounded-full object-cover relative z-10" src="https://static.vecteezy.com/system/resources/thumbnails/041/641/673/small/3d-character-people-close-up-portrait-smiling-nice-3d-avartar-or-icon-png.png">
</div>
<h1 class="text-4xl font-bold tracking-tight mb-2">Aaron Aw</h1>
<p class="text-lg text-slate-300 font-medium mb-4">
        Lead Architect at <span class="text-blue-400">Nexvise</span>
</p>
<p class="text-sm text-slate-400 leading-relaxed px-4 max-w-xs">
        I design digital products, data experiences, and scalable platforms that help businesses move faster with better decisions.
      </p>
</section>
<!-- END: Profile Section -->
<!-- BEGIN: Quick Action Buttons -->
<section class="flex justify-center space-x-8 mb-8" data-purpose="quick-actions">
<!-- Call -->
<div class="flex flex-col items-center">
<button class="w-14 h-14 rounded-full glass-card flex items-center justify-center mb-2 hover:bg-slate-800 transition-colors">
<svg class="h-6 w-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<span class="text-xs text-slate-400">Call</span>
</div>
<!-- Email -->
<div class="flex flex-col items-center">
<button class="w-14 h-14 rounded-full glass-card flex items-center justify-center mb-2 hover:bg-slate-800 transition-colors">
<svg class="h-6 w-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<span class="text-xs text-slate-400">Email</span>
</div>
<!-- WhatsApp -->
<div class="flex flex-col items-center">
<button class="w-14 h-14 rounded-full glass-card flex items-center justify-center mb-2 hover:bg-slate-800 transition-colors">
<svg class="h-6 w-6 text-green-400" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.892a11.826 11.826 0 00-3.481-8.412z"></path>
</svg>
</button>
<span class="text-xs text-slate-400">WhatsApp</span>
</div>
</section>
<!-- END: Quick Action Buttons -->
<!-- BEGIN: Primary CTA -->
<section class="w-full mb-6" data-purpose="primary-action">
<button class="w-full py-4 rounded-2xl bg-button-gradient shadow-lg shadow-blue-500/30 flex items-center justify-center space-x-3 text-lg font-semibold hover:opacity-90 transition-all active:scale-[0.98]">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="">Save to Contacts</span>
</button>
</section>
<!-- END: Primary CTA -->
<!-- BEGIN: Links List -->
<section class="w-full space-y-3 mb-8" data-purpose="links-list">
<!-- LinkedIn -->
<a class="block w-full p-4 glass-card rounded-2xl bg-white/5 flex items-center hover:bg-white/10 transition-colors" href="#">
<div class="bg-blue-600 p-2 rounded-lg mr-4">
<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path></svg>
</div>
<span class="flex-grow font-medium text-slate-200">LinkedIn</span>
<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</a>
<!-- GitHub -->
<a class="block w-full p-4 glass-card rounded-2xl bg-white/5 flex items-center hover:bg-white/10 transition-colors" href="#">
<div class="bg-slate-700 p-2 rounded-lg mr-4">
<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.61-4.041-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path></svg>
</div>
<span class="flex-grow font-medium text-slate-200">GitHub</span>
<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</a>
<!-- Portfolio -->
<a class="block w-full p-4 glass-card rounded-2xl bg-white/5 flex items-center hover:bg-white/10 transition-colors" href="#">
<div class="bg-blue-400 p-2 rounded-lg mr-4">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="flex-grow font-medium text-slate-200">My Portfolio</span>
<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</a>
<!-- Schedule -->
<a class="block w-full p-4 glass-card rounded-2xl bg-white/5 flex items-center hover:bg-white/10 transition-colors" href="#">
<div class="bg-indigo-500 p-2 rounded-lg mr-4">
<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="flex-grow font-medium text-slate-200">Schedule a Meeting</span>
<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</a>
</section>
<!-- END: Links List -->
<!-- BEGIN: Footer Actions -->
<footer class="w-full flex flex-col items-center" data-purpose="card-footer">
<button class="w-full p-4 glass-card rounded-2xl flex items-center justify-between mb-8 hover:bg-white/5 transition-colors">
<div class="flex items-center">
<div class="mr-4">
<svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="font-medium text-slate-200">Show QR Code</span>
</div>
<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<div class="text-slate-500 text-xs flex items-center space-x-1">
<span class="">Powered by</span>
<a class="text-blue-400 font-medium" href="#">Namecard.</a>
<svg class="w-3 h-3 text-red-400 fill-current ml-1" viewBox="0 0 20 20"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"></path></svg>
</div>
</footer>
<!-- END: Footer Actions -->
</main>
<!-- END: Main Card Container -->


</body></html>
